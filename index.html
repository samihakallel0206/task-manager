<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager - Gestionnaire de Tâches</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header avec titre et bouton thème -->
      <div class="header">
        <h1>📋 Task Manager</h1>
        <button
          class="theme-toggle"
          id="themeToggle"
          title="Basculer le mode sombre"
        >
          🌙
        </button>
      </div>

      <!-- Statistiques -->
      <div class="stats-container">
        <div class="stat-card">
          <h3>Total</h3>
          <div class="stat-number" id="totalTasks">0</div>
        </div>
        <div class="stat-card">
          <h3>En cours</h3>
          <div class="stat-number" id="activeTasks">0</div>
        </div>
        <div class="stat-card">
          <h3>Terminées</h3>
          <div class="stat-number" id="completedTasks">0</div>
        </div>
      </div>

      <!-- Barre de progression -->
      <div class="progress-container">
        <div class="progress-label">
          <span>Progression générale</span>
          <span id="progressText">0%</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressBar"></div>
        </div>
      </div>

      <!-- Formulaire d'ajout de tâche -->
      <div class="form-section">
        <h2>Ajouter une nouvelle tâche</h2>
        <form id="taskForm">
          <div class="form-grid">
            <div class="form-group full">
              <label for="taskTitle">Titre de la tâche *</label>
              <input
                type="text"
                id="taskTitle"
                placeholder="Ex: Terminer le rapport..."
                required
              />
            </div>

            <div class="form-group full">
              <label for="taskDescription">Description (optionnel)</label>
              <textarea
                id="taskDescription"
                placeholder="Ajouter des détails..."
              ></textarea>
            </div>

            <div class="form-group">
              <label for="taskDate">Date d'échéance (optionnel)</label>
              <input type="date" id="taskDate" />
            </div>

            <div class="form-group">
              <label for="taskPriority">Priorité</label>
              <select id="taskPriority">
                <option value="low">Basse</option>
                <option value="medium" selected>Moyenne</option>
                <option value="high">Élevée</option>
              </select>
            </div>

            <div class="form-group button-group">
              <button type="reset" class="btn-secondary">Réinitialiser</button>
              <button type="submit" class="btn-primary">
                Ajouter la tâche
              </button>
            </div>
          </div>
        </form>
      </div>

      <!-- Contrôles de filtrage et tri -->
      <div class="controls-section">
        <div class="controls-grid">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input
              type="text"
              id="searchInput"
              placeholder="Rechercher une tâche..."
            />
          </div>

          <div class="form-group">
            <select id="filterStatus">
              <option value="all">Toutes les tâches</option>
              <option value="active">En cours</option>
              <option value="completed">Terminées</option>
            </select>
          </div>

          <div class="form-group">
            <select id="sortBy">
              <option value="date">Trier par date</option>
              <option value="priority">Trier par priorité</option>
              <option value="title">Trier par titre</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Liste des tâches -->
      <div class="tasks-section">
        <div class="tasks-header">
          <h2>Mes tâches</h2>
        </div>
        <div id="tasksList" class="task-list">
          <div class="empty-state">
            <div class="empty-state-icon">📝</div>
            <p>Aucune tâche pour le moment. Ajoutez-en une pour commencer!</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal pour édition de tâche -->
    <div class="modal" id="editModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Modifier la tâche</h3>
          <button type="button" class="close-modal" id="closeModal">
            &times;
          </button>
        </div>
        <form id="editForm">
          <div class="form-grid">
            <div class="form-group full">
              <label for="editTaskTitle">Titre *</label>
              <input type="text" id="editTaskTitle" required />
            </div>

            <div class="form-group full">
              <label for="editTaskDescription">Description</label>
              <textarea id="editTaskDescription"></textarea>
            </div>

            <div class="form-group">
              <label for="editTaskDate">Date d'échéance</label>
              <input type="date" id="editTaskDate" />
            </div>

            <div class="form-group">
              <label for="editTaskPriority">Priorité</label>
              <select id="editTaskPriority">
                <option value="low">Basse</option>
                <option value="medium">Moyenne</option>
                <option value="high">Élevée</option>
              </select>
            </div>

            <div class="form-group button-group">
              <button type="button" class="btn-secondary" id="cancelEdit">
                Annuler
              </button>
              <button type="submit" class="btn-primary">
                Enregistrer les modifications
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- Script -->
    <script src="script.js"></script>
  </body>
</html>
